name: Prepare weekly PMM field note

on:
  schedule:
    - cron: '15 15 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-editorial-drafting
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Research and write
        run: npm run generate:daily
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      - run: npm run build
      - name: Store editorial draft
        run: |
          git config user.name "Kritika Editorial"
          git config user.email "kritikarastogi240@gmail.com"
          git add src/content/writing
          git diff --cached --quiet && exit 0
          git commit -m "content: prepare PMM field note for review"
          git push
